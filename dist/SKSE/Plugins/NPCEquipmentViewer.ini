[General]
; DirectInput code for the hotkey.
; 0x23 = H (default). The value can also be written in decimal: 35.
KeyCode=0x23

; Shows the runtime FormID after each item name.
; Accepted values: true or false.
ShowFormID=false

; Shows the armor slots after each item name.
; Accepted values: true or false.
ShowSlots=true

; Shows the detected equipment type between brackets.
; Accepted values: true or false.
ShowItemType=false
