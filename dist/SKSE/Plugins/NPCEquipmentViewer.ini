[General]
; Codigo DirectInput da tecla de atalho.
; 0x25 = K (padrao). O valor tambem pode ser informado em decimal: 37.
KeyCode=0x25

; Exibe o FormID do NPC e de cada item.
ShowFormID=true

; Exibe os slots de armadura (30 a 61).
ShowSlots=true

; Exibe a categoria do item: arma, escudo, roupa, armadura etc.
ShowItemType=true
