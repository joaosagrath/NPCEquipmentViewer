name: Compilar plugin SKSE

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Preparar compilador do Visual Studio
        uses: ilammy/msvc-dev-cmd@v1

      - name: Instalar Ninja
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Preparar vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configurar
        shell: pwsh
        run: cmake --preset release

      - name: Compilar DLL
        shell: pwsh
        run: cmake --build --preset release

      - name: Preparar compilador Papyrus
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          gh release download 0.3.0a `
            -R KrisV-777/Caprica `
            --pattern "Caprica.zip" `
            --dir "$env:RUNNER_TEMP" `
            --clobber

          New-Item -ItemType Directory -Path "$env:RUNNER_TEMP\Caprica" -Force | Out-Null
          7z x "$env:RUNNER_TEMP\Caprica.zip" "-o$env:RUNNER_TEMP\Caprica" -y

          git clone --depth 1 `
            https://github.com/IHateMyKite/PAPYRUS.git `
            "$env:RUNNER_TEMP\Papyrus"

          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/Rukan/Grimy-Skyrim-Papyrus-Source/master/TESV_Papyrus_Flags.flg" `
            -OutFile "$env:RUNNER_TEMP\TESV_Papyrus_Flags.flg"

      - name: Compilar scripts Papyrus
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Path "build\release\package\Scripts" -Force | Out-Null

          & "$env:RUNNER_TEMP\Caprica\Caprica.exe" `
            --game skyrim `
            --import "$env:RUNNER_TEMP\Papyrus\SRC;$env:RUNNER_TEMP\Papyrus\SRC_UIEXT;dist\Source\Scripts;" `
            --output "build\release\package\Scripts" `
            --flags="$env:RUNNER_TEMP\TESV_Papyrus_Flags.flg" `
            "$env:GITHUB_WORKSPACE\dist\Source\Scripts" `
            -R `
            -q

          $requiredScripts = @(
            "build\release\package\Scripts\NPCEquipmentViewerNative.pex",
            "build\release\package\Scripts\NPCEquipmentViewerMenu.pex"
          )

          foreach ($script in $requiredScripts) {
            if (-not (Test-Path $script)) {
              throw "Script Papyrus não foi gerado: $script"
            }
          }

      - name: Compactar pacote
        shell: pwsh
        run: Compress-Archive -Path "build\release\package\*" -DestinationPath "NPCEquipmentViewer-1.2.0.zip"

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: NPCEquipmentViewer-1.2.0
          path: NPCEquipmentViewer-1.2.0.zip
