name: Compilar plugin SKSE

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-interface:
    runs-on: ubuntu-22.04

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Instalar compilador SWF
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y swfmill
          git clone --depth 1 \
            https://github.com/SkyDwemerForge/ERF-ICON-Widget.git \
            "$RUNNER_TEMP/erf-icon-widget"
          chmod +x "$RUNNER_TEMP/erf-icon-widget/tools/mtasc/mtasc"

      - name: Compilar menu Scaleform
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p interface/build

          swfmill simple \
            interface/NPCEquipmentViewerMenu.xml \
            interface/build/NPCEquipmentViewerMenu.pre.swf

          "$RUNNER_TEMP/erf-icon-widget/tools/mtasc/mtasc" \
            -version 8 \
            -swf interface/build/NPCEquipmentViewerMenu.pre.swf \
            -cp interface/as2 \
            -main NPCEquipmentViewerMenu \
            -frame 1 \
            -keep \
            -out interface/build/NPCEquipmentViewerMenu.swf

          test -s interface/build/NPCEquipmentViewerMenu.swf

      - name: Publicar menu Scaleform intermediário
        uses: actions/upload-artifact@v4
        with:
          name: NPCEquipmentViewer-interface
          path: interface/build/NPCEquipmentViewerMenu.swf
          if-no-files-found: error

  build:
    runs-on: windows-2022
    needs: build-interface

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Preparar compilador do Visual Studio
        uses: ilammy/msvc-dev-cmd@v1

      - name: Instalar Ninja
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Preparar vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configurar
        shell: pwsh
        run: cmake --preset release

      - name: Compilar DLL
        shell: pwsh
        run: cmake --build --preset release

      - name: Baixar menu Scaleform
        uses: actions/download-artifact@v4
        with:
          name: NPCEquipmentViewer-interface
          path: build/release/package/Interface

      - name: Validar pacote
        shell: pwsh
        run: |
          $requiredFiles = @(
            "build\release\package\Interface\NPCEquipmentViewerMenu.swf",
            "build\release\package\SKSE\Plugins\NPCEquipmentViewer.dll",
            "build\release\package\SKSE\Plugins\NPCEquipmentViewer.ini"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Arquivo obrigatório não foi gerado: $file"
            }
          }

      - name: Compactar pacote
        shell: pwsh
        run: Compress-Archive -Path "build\release\package\*" -DestinationPath "NPCEquipmentViewer-2.0.5.zip"

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: NPCEquipmentViewer-2.0.5
          path: NPCEquipmentViewer-2.0.5.zip
          if-no-files-found: error
